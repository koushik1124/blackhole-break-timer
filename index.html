<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Hole Break Timer</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }

    canvas#bg {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      /* 💡 Lets clicks pass through to apps beneath */
      z-index: 1;
    }
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <!-- Import-map lets us use bare `three` specifier without a bundler -->
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js"
    }
  }
  </script>
  <script type="module" src="renderer.js"></script>
</body>

</html>
